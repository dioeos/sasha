[tasks.live-logs]
script = '''
#!/usr/bin/env bash
set -euo pipefail

if [ ! systemctl --user is-active --quiet sasha.service ]; then
  echo "sasha.service not running:"
  journalctl --user -u sasha.service -n 10
fi

journalctl --user -u sasha.service -n 100 -f
'''

[tasks.live-logs-flow]
run_task = "live-logs"
